services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keyhub
      POSTGRES_USER: keyhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keyhub}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyhub -d keyhub"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis_data:/data
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - /bin/sh
      - -c
      - pnpm --filter @keyhub/database prisma:migrate && pnpm --filter @keyhub/database seed
    environment: &app_environment
      NODE_ENV: production
      DATABASE_URL: postgresql://keyhub:${POSTGRES_PASSWORD:-keyhub}@postgres:5432/keyhub
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64:?ENCRYPTION_KEY_BASE64 is required}
      HMAC_KEY_BASE64: ${HMAC_KEY_BASE64:?HMAC_KEY_BASE64 is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://lingshu.101aix.net}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      API_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment: *app_environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment: *app_environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 3s
      retries: 5
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
