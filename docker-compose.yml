services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keyhub
      POSTGRES_USER: keyhub
      POSTGRES_PASSWORD: keyhub
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyhub -d keyhub"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
