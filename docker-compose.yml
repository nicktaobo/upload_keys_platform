services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keyhub
      POSTGRES_USER: keyhub
      POSTGRES_PASSWORD: keyhub
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyhub -d keyhub"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
