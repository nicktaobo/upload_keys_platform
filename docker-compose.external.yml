services:
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - /bin/sh
      - -c
      - pnpm --filter @keyhub/database prisma:migrate && pnpm --filter @keyhub/database seed
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - ENCRYPTION_KEY_BASE64=${ENCRYPTION_KEY_BASE64:?ENCRYPTION_KEY_BASE64 is required}
      - HMAC_KEY_BASE64=${HMAC_KEY_BASE64:?HMAC_KEY_BASE64 is required}
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:8080}
      - API_PORT=3000
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - ENCRYPTION_KEY_BASE64=${ENCRYPTION_KEY_BASE64:?ENCRYPTION_KEY_BASE64 is required}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://lingshu.101aix.net}
      - UPSTREAM_ACCOUNT=${UPSTREAM_ACCOUNT:-}
      - UPSTREAM_PASSWORD=${UPSTREAM_PASSWORD:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - --input-type=module
        - -e
        - >-
          const { createRequire } = await import("node:module");
          const { Redis } = createRequire("/app/apps/worker/package.json")("ioredis");
          const redis = new Redis(process.env.REDIS_URL, { lazyConnect: true, maxRetriesPerRequest: 1, connectTimeout: 1000, retryStrategy: () => null });
          try { await redis.connect(); await redis.ping(); await redis.quit(); }
          catch { redis.disconnect(); process.exit(1); }
      interval: 15s
      timeout: 3s
      retries: 5
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 10
